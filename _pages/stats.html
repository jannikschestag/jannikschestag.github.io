<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<canvas id="pubsPerYear"></canvas>
Publications per year. Only the year of the most recent publication of a paper is counted.

{% assign years = "2019,2020,2021,2022,2023,2024,2025,2026" | split: "," %}

<script>
new Chart(document.getElementById('pubsPerYear'), {
  type: 'bar',
  data: {
    labels: [
      {% for year in years %}
        "{{ year }}"{% unless forloop.last %},{% endunless %}
      {% endfor %}
    ],
    datasets: [{
      label: 'Last publications',
      data: [
        {% for year in years %}
          {% assign yearcount = 0 %}
          {% for pub in site.data.pubs %}
            {% assign pubyear = pub.release-date | slice: 0, 4 %}
            {% if pubyear == year %}
              {% assign yearcount = yearcount | plus: 1 %}
            {% endif %}
          {% endfor %}
          {{ yearcount }}{% unless forloop.last %},{% endunless %}
        {% endfor %}
      ]
    },{
      label: 'First publications',
      data: [
        {% for year in years %}
          {% assign yearcount = 0 %}
          {% for pub in site.data.pubs %}
            {% if pub.first-publication == year %}
              {% assign yearcount = yearcount | plus: 1 %}
            {% endif %}
          {% endfor %}
          {{ yearcount }}{% unless forloop.last %},{% endunless %}
        {% endfor %}
      ]
    },]
  }
});
</script>
