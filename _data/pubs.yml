- title: Tractable Maximization of Budgeted Phylogenetic Diversity on Networks Utilizing Node Scanwidth
  published: true
  release-date: 2026-05-22
  first-publication: 2026
  authors:
    - first: Niels
      last: Holtgrefe
    - first: Jannik
      last: Schestag
  type: preprint
  journal: null
  volume: null
