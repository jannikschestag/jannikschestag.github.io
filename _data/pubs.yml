  abstract: >
    Cost-efficient resource allocation and fair resource allocation are often studied separately, yet practical allocation systems typically require both. We initiate the study of their combination through the problem of finding minimum-cost allocations that are envy-free up to one item. Although EF1 is always attainable and efficiently computable in the classical cost-free setting, we show that the additional cost requirement makes the problem computationally intractable. We then analyze the problem's parameterized complexity and study combinations of natural parameters like the number of agents, the number of items, the budget, the number of different item types, and the maximum evaluation of any item by any agent. Our main results are a polynomial kernel for the number of items and W[1]-hardness for the number of different item types. The combination of all our results gives an almost complete characterization of which parameters admit polynomial kernels, fixed-parameter tractability, and containment in XP. For non-existent tractability results, we present matching lower bounds like W[1]-hardness and para-NP-completeness.
